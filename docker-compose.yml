services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
      - VITE_LOG_API_REQUESTS=${VITE_LOG_API_REQUESTS:-false}
    restart: unless-stopped
